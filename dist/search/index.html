 it&#39;s only now though that they intersect so violently. But regardless: here we are. With a interest intensifying and a desire to talk about everything I have learned so far. \n\n## \&quot;My\&quot; \&quot;First\&quot; Camera and Lenses\nI was very fortunate to have a coworker who has already been hit with the bug of photography. We had some discussions on his work and he, very graciously, lent me his old Nikon for me to play around with, along with a set of lenses. While I was, and am, appreciative for this gear, I couldn&#39;t help but think that there wasn&#39;t much to do with this old ~17 year old camera. But boy, was I wrong. \n\nThe gear:\n* Nikon D5000\n    * Nikon DX 18mm-55mm\n    * Rokinon AF 85mm 1.4F\n    * Nikon Nikkor 70mm-300mm\n\nThe Nikon D5000 still has quite a bit of life in it. The MP count of 12.3 would lead you to believe it&#39;s photos will not be sharp, but they certainly can be if the lens is solid. And to my unprofessional eye, the Nikkor lens is quite solid, even when zoomed in to 300mm. Truthfully, I did not experience much with the other lenses because I was so fixated on birds, but I had enough to know this was only the beginning.\n\n## My First Shots\nThe funny thing is, looking back on these photos, they aren&#39;t especially good. The issue with an older DSLR is that it&#39;s autofocus is not great. That can be a good thing, since beginners would be forced to better learn how to manual focus instead of learning with a crutch, but still. Good or not, they are part of the beginning. My beginning. And they are worthy of preservation.\n![image](/photos/blog-1/DSC_0047.JPG)\n\n![image](/photos/blog-1/DSC_0019.JPG)\n\n![image](/photos/blog-1/DSC_0154.JPG)\n\n## My First Revelations\nA local park was the first obvious destination to mess around with the camera. On this peaceful spring afternoon, I surveyed the waterfront, in search of some waterfawl. But something unexpected struck me as I was searching for a worthy subject: **everything was a worthy subject.** The most inconsequential object can be a key fixture of the art you create. No object is inheriently unworthy. It&#39;s up to you to showcase it in a worthy way. \n\nI was also struck by the peace. It feels like my mind is constantly on the move: thoughts, memories, concerns, anything and everything is flowing back and forth. But as I am standing in this forest, observing the birds sing their mating songs, or watching the squirrels zig through the grass in search for a nut: my mind is empty. I am at peace in a way that I have seldom felt. \n\nAnd finally: the heron. This shot came from a boat while with my parents, it was the shot that made me realize I want to photograph birds. The ubiquitous creatures that surround us on a daily basis, yet we refuse to observe them. The vast variety of these creatures is a mystery to most, myself included. Yet once you observe them, you see how beautiful, colorful, and unique they are. They deserve to be studied.\n\nWith this experience under my belt and fire growing in my belly, I know it&#39;s time to accept the next step: figuring out what in the world I have to buy.&quot;]}],[0,{&quot;slug&quot;:[0,&quot;post-2&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;My First Camera and Lenses&quot;],&quot;meta_title&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;What I ended up choosing for my first camera and the lenses to go with it&quot;],&quot;date&quot;:[3,&quot;2026-05-02T05:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/photos/blog-2/IMG_0121.png&quot;],&quot;categories&quot;:[1,[[0,&quot;art&quot;]]],&quot;authors&quot;:[1,[[0,&quot;Connor Rhoades&quot;]]],&quot;tags&quot;:[1,[[0,&quot;Birds&quot;],[0,&quot;pets&quot;],[0,&quot;dog&quot;],[0,&quot;wildlife&quot;],[0,&quot;Canon&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;After my time with the borrowed 16 year old Nikon, I realized that I did not need to spend an arm and leg on the camera. ANd with some more time spent on Youtube, I learned that the lens was much more important than the camera. But that still lead to my initial dilemma before I got into the details: what camera brand do I go with? I spent a lot of time thinking on this and I ended up starting by coming up with specific goals:\n1. I want to stay under $300 for the camera\n2. I want plenty of lens options\n3. I want a clear upgrade path\n4. I want something considered easy to use\n\nThis immediately led me down the path of old DSLRs, which seemed to limit my options to Canon and Nikon. In the end, I went with Canon. Why? Because my mom has a Canon as well and I figured my learnings would help her out as she was learning bird photography as well. But with this, seemingly arbitrary, decision made, I went down the rabbit whole of what specific camera and lenses I would get. I ended up with the following:\n\n* Canon 70D\n    * Tamron 150-600mm F/5-6.3 (generation I)\n    * Canon EF 75-300mm F/4-5.6 II\n    * Canon EF 50mm F/1.4\n    * Canon EF-S 10-18mm F/4.5-5.6 (not yet in hand)\n\nI have many thoughts on this setup, after having played with them for a few weeks.\n\n## Canon 70D\nThe camera itself: I am very happy with. It had less than 10K shutters at the time of purchase and was in excellent condition. I found the menus easy to use and the controls intuitive. Besides the fact that I am not able to get the camera to update its firmware from 1.1.1 (and the fact that it&#39;s a bit heavy, though I don&#39;t find this mattering when it comes to birding), I am very happy with the camera itself. \n\n## Canon EF 75-300mm F/4-5.6 II\nThis was originally the first lens I bought. I knew it was a kit lens, but I had decent hopes for it after the Nikkor one performed very well. I was mistaken. Now, it&#39;s not \&quot;bad\&quot;, but I am not happy with the chromatic abberation coming from it and the softness of the images it processes after 200mm. Now, I do recognise that there is some skill that can be put in here to get better images. I can make them better. But, I just find myself much more underwhelmed given how effortlessly the Nikkor performed. So far, it is the only true disappointment I have at the moment. \n\n![image](/photos/blog-2/IMG_9392.JPG)\n![image](/photos/blog-2/IMG_9428.JPG)\n![image](/photos/blog-2/IMG_9445.JPG)\n![image](/photos/blog-2/IMG_9455.JPG)\n\n## Tamron 150-600mm F/5-6.3\nAfter I was disappointed by the first Canon lens, I considered if I wanted to drop a few hundred dollars on a \&quot;proper\&quot; lens. The issue was, based on the research I did, a very solid telephoto lens that went into the 400-600mm territory was going to run me $2000. I absolutely did not want to do that yet. I saw some reviews on this first gen Tamron, and the consensus I saw was that it&#39;s solid for the price, but it requires a bit of work to get really good shots out of it (like a monopod and tripod). I ended up taking a gamble on a basically new one for $700. Having used it for a few weeks, I will say: I&#39;m not disappointed. The consensus formed was pretty accurate, but I am finding that you can get some fantastic images from it with a little work.\n\n![image](/photos/blog-2/IMG_9981.jpeg)\n![image](/photos/blog-2/IMG_0121.png)\n![image](/photos/blog-2/IMG_0203.jpeg)\n![image](/photos/blog-2/IMG_0310.jpeg)\n![image](/photos/blog-2/IMG_0351.jpeg)\n\n\n\n## Canon EF 50mm F/1.4\n\nI decided to pick up a \&quot;nifty fifty\&quot; after I saw all of the YouTube videos praising it. I will say that I have not gotten full use out of it yet, but. I am very intrigued to say the least. I am getting very sharp photos out of it with a nice portrait effect. I am very excited to experiment with it in a non-birding context. \n\n![image](/photos/misc/casper-portrait-blackandwhite.jpg)\n\n## Conclusion\nAll in all, I&#39;m pretty happy with where I&#39;m at. There is a lot more potential to still extract from this setup and much more room for me to grow. I also think that this Canon 70D has plenty of life left in it. I&#39;m ready to put it to the test.\n\n![image](/photos/blog-2/IMG_7205.jpeg)&quot;]}]]]}" ssr client="load" opts="{&quot;name&quot;:&quot;SearchBar&quot;,&quot;value&quot;:true}" await-children><div class="min-h-[45vh]"><input class="form-input w-full text-center" placeholder="Type here to Search posts" type="text" autoComplete="off" autofocus="" name="search" value=""/><div class="row"></div></div><!--astro:end--></astro-island> </div> </section>  </main> <footer class="section bg-dark"> <div class="container text-center">  <ul class="mb-8 space-x-4"> <li class="inline-block"> <a href="/about" class="p-4 text-white/75 hover:text-white transition-all"> About </a> </li><li class="inline-block"> <a href="/contact" class="p-4 text-white/75 hover:text-white transition-all"> Contact </a> </li> </ul>  <ul class="social-icons mb-8"> <li> <a aria-label="facebook" href="https://www.facebook.com/" target="_blank" rel="noopener noreferrer nofollow"> <span class="sr-only">facebook</span> <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" class="inline-block" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M512 256C512 114.6 397.4 0 256 0S0 114.6 0 256C0 376 82.7 476.8 194.2 504.5V334.2H141.4V256h52.8V222.3c0-87.1 39.4-127.5 125-127.5c16.2 0 44.2 3.2 55.7 6.4V172c-6-.6-16.5-1-29.6-1c-42 0-58.2 15.9-58.2 57.2V256h83.6l-14.4 78.2H287V510.1C413.8 494.8 512 386.9 512 256h0z"></path></svg> </a> </li><li> <a aria-label="X" href="https://x.com/" target="_blank" rel="noopener noreferrer nofollow"> <span class="sr-only">X</span> <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" class="inline-block" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M389.2 48h70.6L305.6 224.2 487 464H345L233.7 318.6 106.5 464H35.8L200.7 275.5 26.8 48H172.4L272.9 180.9 389.2 48zM364.4 421.8h39.1L151.1 88h-42L364.4 421.8z"></path></svg> </a> </li><li> <a aria-lab
